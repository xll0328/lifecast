<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — LifeCast</title>
  <meta name="robots" content="noindex" />
  <style>
    :root{--bg:#f4f7fc;--card:#ffffff;--ink:#1a2a44;--muted:#5f7396;--acc:#436289;--line:#dbe3f0}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(1200px 500px at 85% -10%,#dfe9fb 0%,transparent 55%),var(--bg);font-family:"DM Sans",system-ui,sans-serif;color:var(--ink)}
    .card{width:min(92vw,680px);background:var(--card);border:1px solid var(--line);border-radius:18px;padding:2rem 2.2rem;box-shadow:0 18px 45px rgba(38,56,90,.1)}
    .k{font:600 .75rem/1 "JetBrains Mono",monospace;letter-spacing:.08em;text-transform:uppercase;color:#6f83a8}
    h1{margin:.45rem 0 .35rem;font:400 2.25rem/1.1 "Instrument Serif",serif}
    p{margin:.4rem 0 1.35rem;color:var(--muted);line-height:1.65}
    .actions{display:flex;gap:.65rem;flex-wrap:wrap}
    a{display:inline-flex;align-items:center;justify-content:center;text-decoration:none;border-radius:10px;padding:.58rem .95rem;font-weight:600;font-size:.92rem}
    .pri{background:var(--acc);color:#fff;border:1px solid #3f5c84}
    .sec{background:#f7faff;color:#4f6691;border:1px solid #d6e0ef}
  </style>
</head>
<body>
  <main class="card">
    <div class="k">LifeCast</div>
    <h1>404 — Page not found</h1>
    <p>The page you opened does not exist or the link is outdated. You can return to the homepage and continue exploring the project results and interactive simulation.</p>
    <div class="actions">
      <a class="pri" href="/">Back to homepage</a>
      <a class="sec" href="/#demo">Go to demo</a>
    </div>
  </main>
</body>
</html>
